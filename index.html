<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Auto Date Widget</title>
  <style>
    :root {
      --paper: #f8f1e5;
      --paper-light: #fffaf0;
      --brown: #4a2f1d;
      --gold: #d9a93a;
      --green: #8fa781;
      --tape: rgba(232, 203, 145, 0.9);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: transparent;
      font-family: Georgia, 'Times New Roman', serif;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
    }

    .widget {
      position: relative;
      width: 150px;
      height: 218px;
      padding: 42px 14px 24px;
      overflow: hidden;
      color: var(--brown);
      text-align: center;
      border-radius: 4px 9px 7px 8px;
      background:
        radial-gradient(circle at 45% 12%, rgba(255, 255, 255, 0.75), transparent 42%),
        linear-gradient(135deg, var(--paper-light), var(--paper));
      box-shadow: 0 10px 22px rgba(78, 52, 28, 0.13);
      isolation: isolate;
    }

    .widget::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: -1;
      border-radius: inherit;
      background-image:
        linear-gradient(90deg, rgba(74,47,29,0.028) 1px, transparent 1px),
        linear-gradient(0deg, rgba(74,47,29,0.022) 1px, transparent 1px);
      background-size: 14px 14px;
      opacity: 0.38;
    }

    .widget::after {
      content: '';
      position: absolute;
      top: -1px;
      left: 50%;
      width: 78px;
      height: 24px;
      transform: translateX(-50%) rotate(-0.4deg);
      background: var(--tape);
      border-radius: 2px;
      box-shadow: 0 2px 5px rgba(74, 47, 29, 0.08);
      backdrop-filter: blur(0.5px);
    }

    .month {
      font-size: 13px;
      line-height: 1;
      font-weight: 500;
      letter-spacing: 0.36em;
      margin-left: 0.36em;
    }

    .line {
      width: 62%;
      height: 1px;
      margin: 14px auto 15px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .date {
      position: relative;
      z-index: 2;
      font-size: 74px;
      line-height: 0.86;
      font-weight: 500;
      letter-spacing: -0.075em;
      margin-left: -3px;
    }

    .weekday {
      position: relative;
      z-index: 3;
      margin-top: 16px;
      font-size: 12px;
      line-height: 1;
      letter-spacing: 0.36em;
      margin-left: 0.36em;
    }

    .flower {
      position: absolute;
      z-index: 4;
      left: 47px;
      top: 107px;
      width: 36px;
      height: 58px;
      opacity: 0.96;
      pointer-events: none;
    }

    .stem {
      position: absolute;
      left: 12px;
      bottom: 1px;
      width: 1.5px;
      height: 50px;
      border-radius: 99px;
      background: #78966f;
      transform: rotate(1deg);
      transform-origin: bottom;
    }

    .stem.s2 {
      left: 24px;
      height: 36px;
      transform: rotate(18deg);
    }

    .leaf {
      position: absolute;
      width: 10px;
      height: 6px;
      border-radius: 999px;
      background: var(--green);
      opacity: 0.9;
    }

    .leaf.l1 { left: 4px; bottom: 25px; transform: rotate(-28deg); }
    .leaf.l2 { left: 13px; bottom: 18px; transform: rotate(23deg); }
    .leaf.l3 { left: 21px; bottom: 14px; transform: rotate(-28deg); }
    .leaf.l4 { left: 27px; bottom: 25px; transform: rotate(30deg); }

    .bloom {
      position: absolute;
      width: 22px;
      height: 22px;
    }

    .bloom.b1 { left: 1px; top: 5px; }
    .bloom.b2 { left: 24px; top: 32px; transform: scale(0.58); }

    .petal, .center {
      position: absolute;
      border-radius: 999px;
    }

    .petal {
      width: 8px;
      height: 12px;
      left: 7px;
      top: 2px;
      background: #efc94f;
      transform-origin: 50% 9px;
      box-shadow: inset 0 0 0 1px rgba(149, 107, 21, 0.08);
    }

    .p1 { transform: rotate(0deg); }
    .p2 { transform: rotate(72deg); }
    .p3 { transform: rotate(144deg); }
    .p4 { transform: rotate(216deg); }
    .p5 { transform: rotate(288deg); }

    .center {
      left: 8.7px;
      top: 8.7px;
      width: 5px;
      height: 5px;
      background: #c9932c;
    }
  </style>
</head>
<body>
  <main class="widget" aria-label="오늘 날짜 위젯">
    <div class="month" id="month">MAY</div>
    <div class="line"></div>
    <div class="date" id="date">18</div>
    <div class="weekday" id="weekday">MONDAY</div>

    <div class="flower" aria-hidden="true">
      <div class="stem"></div>
      <div class="stem s2"></div>
      <div class="leaf l1"></div>
      <div class="leaf l2"></div>
      <div class="leaf l3"></div>
      <div class="leaf l4"></div>
      <div class="bloom b1">
        <div class="petal p1"></div><div class="petal p2"></div><div class="petal p3"></div><div class="petal p4"></div><div class="petal p5"></div><div class="center"></div>
      </div>
      <div class="bloom b2">
        <div class="petal p1"></div><div class="petal p2"></div><div class="petal p3"></div><div class="petal p4"></div><div class="petal p5"></div><div class="center"></div>
      </div>
    </div>
  </main>

  <script>
    const monthNames = ['JANUARY', 'FEBRUARY', 'MARCH', 'APRIL', 'MAY', 'JUNE', 'JULY', 'AUGUST', 'SEPTEMBER', 'OCTOBER', 'NOVEMBER', 'DECEMBER'];
    const weekdayNames = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];

    function updateDate() {
      const now = new Date();
      document.getElementById('month').textContent = monthNames[now.getMonth()];
      document.getElementById('date').textContent = now.getDate();
      document.getElementById('weekday').textContent = weekdayNames[now.getDay()];
    }

    updateDate();
    setInterval(updateDate, 60 * 1000);
  </script>
</body>
</html>
