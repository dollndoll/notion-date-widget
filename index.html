<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Auto Date Widget</title>
  <style>
    :root {
      --paper: #f6f0e5;
      --paper-light: #fffaf0;
      --brown: #4b3320;
      --gold: #e6c35c;
      --green: #9ab18e;
      --tape: rgba(238, 218, 178, 0.82);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: transparent;
      font-family: Georgia, 'Times New Roman', serif;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
    }

    .widget {
      position: relative;
      width: 120px;
      height: 170px;
      overflow: hidden;
      padding: 27px 10px 13px;
      background:
        radial-gradient(circle at 30% 20%, rgba(255,255,255,0.9), transparent 36%),
        linear-gradient(135deg, var(--paper-light), var(--paper));
      color: var(--brown);
      border-radius: 5px 9px 6px 8px;
      box-shadow: 0 18px 34px rgba(75, 51, 32, 0.14);
      text-align: center;
      isolation: isolate;
    }

    .widget::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background-image:
        linear-gradient(90deg, rgba(75,51,32,0.025) 1px, transparent 1px),
        linear-gradient(0deg, rgba(75,51,32,0.02) 1px, transparent 1px);
      background-size: 18px 18px;
      opacity: 0.35;
      z-index: -1;
    }

    .widget::after {
      content: '';
      position: absolute;
      left: 50%;
      top: -8px;
      width: 60px;
      height: 18px;
      transform: translateX(-50%) rotate(-1deg);
      background: var(--tape);
      border-radius: 3px;
      box-shadow: 0 2px 5px rgba(75, 51, 32, 0.08);
      backdrop-filter: blur(1px);
    }

    .month {
      font-size: 12px;
      letter-spacing: 0.34em;
      margin-left: 0.34em;
      line-height: 1;
      font-weight: 500;
    }

    .line {
      width: 68%;
      height: 1px;
      margin: 11px auto 11px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .date {
      font-size: 58px;
      line-height: 0.9;
      font-weight: 500;
      letter-spacing: -0.06em;
    }

    .weekday {
      margin-top: 13px;
      font-size: 10px;
      letter-spacing: 0.34em;
      margin-left: 0.34em;
      line-height: 1;
    }

    .flower {
      position: absolute;
      left: 36px;
      bottom: 50px;
      width: 31px;
      height: 47px;
      opacity: 0.95;
      transform: scale(0.72);
      transform-origin: bottom left;
    }

    .stem {
      position: absolute;
      left: 16px;
      bottom: 0;
      width: 1.4px;
      height: 47px;
      background: #7f966e;
      border-radius: 99px;
      transform: rotate(2deg);
      transform-origin: bottom;
    }

    .stem.s2 {
      left: 23px;
      height: 34px;
      transform: rotate(20deg);
    }

    .leaf, .petal, .center {
      left: 9px;
      top: 9px;
      width: 5px;
      height: 5px;
      background: #d69d36;
    }

    .leaf {
      width: 10px;
      height: 6px;
      background: var(--green);
      transform-origin: center;
    }

    .leaf.l1 { left: 8px; bottom: 14px; transform: rotate(-30deg); }
    .leaf.l2 { left: 17px; bottom: 24px; transform: rotate(24deg); }
    .leaf.l3 { left: 24px; bottom: 10px; transform: rotate(-24deg); }
    .leaf.l4 { left: 25px; bottom: 28px; transform: rotate(30deg); }

    .bloom {
      position: absolute;
      width: 22px;
      height: 22px;
    }

    .bloom.b1 { left: 5px; top: 8px; }
    .bloom.b2 { left: 22px; top: 31px; transform: scale(0.62); }

    .petal {
      width: 8px;
      height: 12px;
      background: #f1c94d;
      left: 7px;
      top: 2px;
      transform-origin: 50% 9px;
      box-shadow: inset 0 0 0 1px rgba(149, 107, 21, 0.08);
    }

    .p1 { transform: rotate(0deg); }
    .p2 { transform: rotate(72deg); }
    .p3 { transform: rotate(144deg); }
    .p4 { transform: rotate(216deg); }
    .p5 { transform: rotate(288deg); }

    .center {
      left: 18px;
      top: 18px;
      width: 9px;
      height: 9px;
      background: #d69d36;
    }
  </style>
</head>
<body>
  <main class="widget" aria-label="오늘 날짜 위젯">
    <div class="month" id="month">MAY</div>
    <div class="line"></div>
    <div class="date" id="date">18</div>
    <div class="weekday" id="weekday">MONDAY</div>

    <div class="flower" aria-hidden="true">
      <div class="stem"></div>
      <div class="stem s2"></div>
      <div class="leaf l1"></div>
      <div class="leaf l2"></div>
      <div class="leaf l3"></div>
      <div class="leaf l4"></div>
      <div class="bloom b1">
        <div class="petal p1"></div><div class="petal p2"></div><div class="petal p3"></div><div class="petal p4"></div><div class="petal p5"></div><div class="center"></div>
      </div>
      <div class="bloom b2">
        <div class="petal p1"></div><div class="petal p2"></div><div class="petal p3"></div><div class="petal p4"></div><div class="petal p5"></div><div class="center"></div>
      </div>
    </div>
  </main>

  <script>
    const monthNames = ['JANUARY', 'FEBRUARY', 'MARCH', 'APRIL', 'MAY', 'JUNE', 'JULY', 'AUGUST', 'SEPTEMBER', 'OCTOBER', 'NOVEMBER', 'DECEMBER'];
    const weekdayNames = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];

    function updateDate() {
      const now = new Date();
      document.getElementById('month').textContent = monthNames[now.getMonth()];
      document.getElementById('date').textContent = now.getDate();
      document.getElementById('weekday').textContent = weekdayNames[now.getDay()];
    }

    updateDate();
    setInterval(updateDate, 60 * 1000);
  </script>
</body>
</html>
